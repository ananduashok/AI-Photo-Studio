<!DOCTYPE html>
<html>
<head>

<title>AI Photo Studio</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
margin-top:40px;
background:#f4f6f8;
}

#drop-area{
border:2px dashed #888;
padding:40px;
width:400px;
margin:auto;
background:white;
}

#drop-area.highlight{
border-color:#007BFF;
}

img{
margin-top:20px;
max-width:400px;
border-radius:8px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
background:#007BFF;
color:white;
font-size:16px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#0056b3;
}

#spinner{
display:none;
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h2>AI Background Remover</h2>

<div id="drop-area">

<p>Drag & Drop Image Here</p>

<input type="file" id="fileInput">

<br><br>

<label>Background Color</label><br>

R <input type="number" id="r" value="255" min="0" max="255">
G <input type="number" id="g" value="255" min="0" max="255">
B <input type="number" id="b" value="255" min="0" max="255">

<br>

<button onclick="uploadImage()">Process Image</button>

</div>

<h3>Preview</h3>

<img id="preview">

<div id="spinner">Processing image...</div>

<h3>Result</h3>

<img id="resultImage">

<br>

<a id="downloadLink" download></a>

<script>

let selectedFile = null;

const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", function(){
selectedFile = this.files[0];
showPreview(selectedFile);
});

dropArea.addEventListener("dragover", e=>{
e.preventDefault();
dropArea.classList.add("highlight");
});

dropArea.addEventListener("dragleave", ()=>{
dropArea.classList.remove("highlight");
});

dropArea.addEventListener("drop", e=>{
e.preventDefault();
dropArea.classList.remove("highlight");

selectedFile = e.dataTransfer.files[0];
showPreview(selectedFile);
});

function showPreview(file){

const reader = new FileReader();

reader.onload = function(e){
preview.src = e.target.result;
}

reader.readAsDataURL(file);

}

async function uploadImage(){

if(!selectedFile){
alert("Please select an image");
return;
}

const spinner = document.getElementById("spinner");
spinner.style.display = "block";

const formData = new FormData();

formData.append("file", selectedFile);
formData.append("r", document.getElementById("r").value);
formData.append("g", document.getElementById("g").value);
formData.append("b", document.getElementById("b").value);

const response = await fetch("/remove-bg",{
method:"POST",
body:formData
});

const data = await response.json();

spinner.style.display = "none";

const resultImage = document.getElementById("resultImage");
const downloadLink = document.getElementById("downloadLink");

resultImage.src = data.image_url;

downloadLink.href = data.image_url;
downloadLink.innerText = "Download Image";

}

</script>

</body>
</html>
